<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Security Settings | CricTracker</title>
    {% load static %}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f4f7f6; }
        .security-card { border: none; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .input-group-text { background: transparent; border-right: none; color: #1e3c72; }
        .form-control { border-left: none; }
    </style>
</head>
<body>
    {% include 'header.html' %}
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card security-card p-4">
                    <div class="text-center mb-4">
                        <div class="bg-primary-subtle text-primary rounded-circle d-inline-flex p-3 mb-3">
                            <i class="fas fa-shield-alt fa-2x"></i>
                        </div>
                        <h4>Update Password</h4>
                        <p class="text-muted small">Enter your current and new credentials below.</p>
                    </div>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label small fw-bold">Current Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="old_password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>
                        <hr class="my-4">
                        <div class="mb-3">
                            <label class="form-label small fw-bold">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-key"></i></span>
                                <input type="password" name="new_password" class="form-control" placeholder="Minimum 8 characters" required>
                            </div>
                        </div>
                        <div class="mb-4">
                            <label class="form-label small fw-bold">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-check-circle"></i></span>
                                <input type="password" name="confirm_password" class="form-control" placeholder="Match new password" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">Change Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
