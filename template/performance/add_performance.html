<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Performance | CricTracker</title>
    {% load static %}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background-color: #f4f7fa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .selection-card {
            background: white;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            padding: 40px;
            margin-top: 50px;
        }

        .section-title {
            font-weight: 800;
            color: #1e3c72;
            margin-bottom: 15px;
            text-align: center;
        }

        /* Performance Tiles */
        .performance-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .performance-tile {
            position: relative;
        }

        .performance-tile input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .tile-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 25px 15px;
            background: #ffffff;
            border: 2px solid #edf2f7;
            border-radius: 18px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-align: center;
        }

        .tile-content i {
            font-size: 2rem;
            margin-bottom: 12px;
            color: #a0aec0;
            transition: 0.3s;
        }

        .tile-content span {
            font-weight: 700;
            color: #718096;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Active State */
        .performance-tile input[type="radio"]:checked + .tile-content {
            border-color: #1e3c72;
            background-color: #f0f7ff;
            box-shadow: 0 8px 20px rgba(30, 60, 114, 0.1);
        }

        .performance-tile input[type="radio"]:checked + .tile-content i {
            color: #1e3c72;
            transform: scale(1.1);
        }

        .performance-tile input[type="radio"]:checked + .tile-content span {
            color: #1e3c72;
        }

        .tile-content:hover {
            border-color: #cbd5e0;
            transform: translateY(-5px);
        }

        .go-btn {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            border: none;
            padding: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .go-btn:hover {
            box-shadow: 0 10px 25px rgba(30, 60, 114, 0.3);
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .form-label {
            font-weight: 700;
            color: #4a5568;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>

    {% include 'header.html' %}

    <div class="container pb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <div class="selection-card">
                    <h2 class="section-title">New Match Performance</h2>
                    <p class="text-center text-muted mb-5">Select a player from your squad and the type of stats you want to record for today's match.</p>

                    <form method="POST">
                        {% csrf_token %}

                        <div class="mb-5">
                            <label for="playerSelect" class="form-label mb-3">
                                <i class="fas fa-user-plus me-2 text-primary"></i>1. Select the Player
                            </label>
                            <select id="playerSelect" name="player_id" class="form-select form-select-lg shadow-sm border-2" style="border-radius: 12px;" required>
                                <option value="" disabled selected>Select player from squad...</option>
                                {% for player in players %}
                                    <option value="{{ player.id }}">{{ player.firstname }} {{player.lastname}} — ({{player.role}})</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="mb-4">
                            <label class="form-label mb-3">
                                <i class="fas fa-star me-2 text-warning"></i>2. Choose Activity Type
                            </label>
                            <div class="performance-grid">
                                <label class="performance-tile">
                                    <input type="radio" name="performance_type" value="batting" required>
                                    <div class="tile-content">
                                        <i class="fas fa-baseball-bat-ball"></i>
                                        <span>Batting</span>
                                    </div>
                                </label>

                                <label class="performance-tile">
                                    <input type="radio" name="performance_type" value="bowling">
                                    <div class="tile-content">
                                        <i class="fas fa-baseball-ball"></i>
                                        <span>Bowling</span>
                                    </div>
                                </label>

                                <label class="performance-tile">
                                    <input type="radio" name="performance_type" value="fielding">
                                    <div class="tile-content">
                                        <i class="fas fa-hands"></i>
                                        <span>Fielding</span>
                                    </div>
                                </label>

                                <label class="performance-tile">
                                    <input type="radio" name="performance_type" value="wicketkeeper">
                                    <div class="tile-content">
                                        <i class="fas fa-mitten"></i>
                                        <span>Keeper</span>
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary go-btn w-100 shadow">
                                Proceed to Data Entry <i class="fas fa-chevron-right ms-2"></i>
                            </button>
                            <p class="mt-3 small text-muted">You will be redirected to the specific scoring form.</p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
