<!DOCTYPE html>
<html>
    <head>
        <title>my teams</title>
        {% load static %}
    <link rel="shortcut icon" type="image/png" href="{% static 'images/icon/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'css/metisMenu.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/slicknav.min.css' %}">
    <!-- amchart css -->
    <link rel="stylesheet" href="{% static 'https://www.amcharts.com/lib/3/plugins/export/export.css' %}" type="text/css" media="all" />
    <!-- others css -->
    <link rel="stylesheet" href="{% static 'css/typography.css' %}">
    <link rel="stylesheet" href="{% static 'css/default-css.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <!-- modernizr css -->
    <script src="{% static 'js/vendor/modernizr-2.8.3.min.js' %}"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

        <!-- Font Awesome 5 -->
        <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
<body>

{% include 'header.html' %}

<div class="container">

        {% if messages %}
          <div class="container mt-3">
         {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
               </div>
         {% endif %}

<div class="mt-5 text-center">
    <h3>My Teams</h3>
    <div class="d-flex justify-content-center">
        <table class="table table-bordered table-striped mt-3" style="width: 85%;">
            <thead class="table-dark">
                <tr>
                    <th>sr. no.</th>
                    <th> logo </th>
                    <th>Team Name</th>
                    <th>Added on</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                
               {% for team in teams %}
                <tr>
                    <td>{{forloop.counter}}</td>
                    <td><img src="{{team.logo.url}}" alt=""  style="width: 50px; height: 30px"></td>
                    <td>{{team.name}}</td>
                    <td>{{team.created_at|date}}</td>
                    <td>
                     
                <a href="{% url 'edit_team' team.id %}" class="text-primary">
                  <i class="fas fa-edit"></i>
                 </a>
         
              <a href="{% url 'delete_team' team.id %}" class="text-danger ms-3"
                    onclick="return confirm('Are you sure you want to delete this team?');">
                   <i class="fas fa-trash-alt"></i>
               </a>
                    </td>
                </tr>
                {% endfor %}
                
             
            </tbody>
        
           


        </table>
    </div>

          <a class="btn btn-primary" href="{% url 'add_team' %}">
                <i class="fas fa-plus-circle"></i> Add Team
            </a>
</div>
</div>

     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    </body>
</html>
