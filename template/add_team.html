<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Team Profile | CricTracker</title>
    {% load static %}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .upload-card { border-radius: 20px; border: 2px dashed #dee2e6; transition: 0.3s; }
        .upload-card:hover { border-color: #1e3c72; background: #f8fbff; }
    </style>
</head>
<body>
    {% include 'header.html' %}
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card border-0 shadow-lg" style="border-radius: 20px;">
                    <div class="card-body p-5">
                        <h3 class="fw-bold mb-4 text-center">{% if team %}Edit Team Profile{% else %}Create New Team{% endif %}</h3>
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="form-label fw-bold">Official Team Name</label>
                                <input type="text" class="form-control form-control-lg" name="team_name" value="{{team.name}}" placeholder="e.g. Mumbai Indians" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Team Identity (Logo)</label>
                                <div class="upload-card p-4 text-center">
                                    <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                                    <input type="file" class="form-control" name="teamlogo" {% if not team %}required{% endif %}>
                                    <p class="small text-muted mt-2">Recommended: Square PNG/JPG (Min 500x500px)</p>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill fw-bold">
                                {% if team %}Update Team{% else %}Register Team{% endif %}
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
