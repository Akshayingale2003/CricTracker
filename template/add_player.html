<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Player Management | CricTracker</title>
    {% load static %}
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; }
        .form-card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); overflow: hidden; }
        .form-header { background: #1e3c72; color: white; padding: 25px; }
        .form-label { font-weight: 600; color: #555; font-size: 0.9rem; }
        .form-control, .form-select { padding: 12px; border-radius: 10px; border: 1px solid #dee2e6; }
    </style>
</head>
<body>
    {% include 'header.html' %}
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card form-card">
                    <div class="form-header text-center">
                        <h3 class="mb-0">{% if player %}Update Player Profile{% else %}Register New Player{% endif %}</h3>
                    </div>
                    <div class="card-body p-4 p-lg-5">
                        <form method="POST">
                            {% csrf_token %}
                            <div class="row g-4">
                                <div class="col-md-6">
                                    <label class="form-label">First Name</label>
                                    <input type="text" class="form-control" name="firstname" value="{{player.firstname}}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" class="form-control" name="lastname" value="{{player.lastname}}" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Player Role</label>
                                    <select class="form-select" name="role" required>
                                        <option value="Batsman" {% if player.role == 'Batsman' %}selected{% endif %}>Batsman</option>
                                        <option value="Bowler" {% if player.role == 'Bowler' %}selected{% endif %}>Bowler</option>
                                        <option value="All-Rounder" {% if player.role == 'All-Rounder' %}selected{% endif %}>All-Rounder</option>
                                        <option value="Wicket-Keeper" {% if player.role == 'Wicket-Keeper' %}selected{% endif %}>Wicket-Keeper</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">Batting Style</label>
                                    <select class="form-select" name="bat_style">
                                        <option value="right-handed" {% if player.batting_style == 'right-handed' %}selected{% endif %}>Right Handed</option>
                                        <option value="left-handed" {% if player.batting_style == 'left-handed' %}selected{% endif %}>Left Handed</option>
                                    </select>
                                </div>
                            </div>
                            <div class="mt-5 d-grid">
                                <button type="submit" class="btn btn-primary py-3 fw-bold rounded-pill">
                                    <i class="fas fa-save me-2"></i>Save Player Details
                                </button>
                                <a href="{% url 'view_players' %}" class="btn btn-link text-muted mt-2">Cancel and Go Back</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
