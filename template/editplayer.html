<!DOCTYPE html>
<html>
<head>
    <title>Edit Player</title>
   {% load static %}
    <link rel="shortcut icon" type="image/png" href="{% static 'images/icon/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'css/metisMenu.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/slicknav.min.css' %}">
    <!-- amchart css -->
    <link rel="stylesheet" href="{% static 'https://www.amcharts.com/lib/3/plugins/export/export.css' %}" type="text/css" media="all" />
    <!-- others css -->
    <link rel="stylesheet" href="{% static 'css/typography.css' %}">
    <link rel="stylesheet" href="{% static 'css/default-css.css' %}">
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/responsive.css' %}">
    <!-- modernizr css -->
    <script src="{% static 'js/vendor/modernizr-2.8.3.min.js' %}"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/js/all.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .edit-player-container {
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 10px;
            background: #fff;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-light">
    
    {% include 'header.html' %}
    
    <div class="container">
         {% if messages %}
          <div class="container mt-3">
         {% for message in messages %}
          <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
          {{ message }}
           <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
          {% endfor %}
               </div>
         {% endif %}

        <div class="edit-player-container">
            <h2 class="text-center">Edit Player Info</h2>

            <form method="POST" >
                {% csrf_token %}
                
                <div class="mb-3">
                    <label for="first_name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first_name" name="first_name" value="{{player.firstname}}" required>
                </div>
                
                <div class="mb-3">
                    <label for="last_name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last_name" name="last_name" value="{{player.lastname}}" required>
                </div>
                
                <div class="mb-3">
                    <label for="role" class="form-label">Role</label>
                    <select class="form-select" id="role" name="role" required>
                        <option value="Batsman" {% if player.role == "Batsman" %}selected{% endif %}>Batsman</option>
                        <option value="Bowler" {% if player.role == "Bowler" %}selected{% endif %}>Bowler</option>
                        <option value="All-Rounder" {% if player.role == "All-Rounder" %}selected{% endif %}>All-Rounder</option>
                        <option value="Wicketkeeper" {% if player.role == "Wicketkeeper" %}selected{% endif %}>Wicketkeeper</option>
                    </select>
                </div>
                
                <div class="mb-3">
                    <label for="team" class="form-label">Team</label>
                    <select class="form-select" id="team" name="team" required>
                        <option value="" disabled selected>select team</option>
                        {% for team in teams %}
                            <option value="{{ team.id }}" {% if player.team.id == team.id %}selected{% endif %}>{{ team.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                

                <div class="mb-3">
                    <label class="form-label">Batting Style</label>
                    <select class="form-select" name="bat_style" required>
                        <option value="" disabled>Batting Style</option>
                        <option value="left-hande" {% if player.batting_style == 'left-handed' %} selected {% endif %}>left-handed</option>
                        <option value="right-handed" {% if player.batting_style == 'right-handed' %} selected {% endif %}>right-handed</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Balling Style</label>
                    <select class="form-select" name="ball_style" required>
                        <option value="" disabled>Balling Style</option>
                        <option value="left-arm-spin" {% if player.balling_style == 'left-arm-spin' %} selected {% endif %}>left-arm-spin</option>
                        <option value="right-arm-spin" {% if player.balling_style == 'right-arm-spin' %} selected {% endif %}>right-arm-spin</option>
                        <option value="left-arm-pacer" {% if player.balling_style == 'left-arm-pacer' %} selected {% endif %}>lef-arm-pacer</option>
                        <option value="right-arm-pacer" {% if player.balling_style == 'right-arm-pacer' %} selected {% endif %}>right-arm-pacer</option>
                    </select>
                </div>



                <div class="text-center">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
